name: Moog
description: >-
  Moog Inc. is a worldwide designer, manufacturer, and integrator of precision
  motion and fluid control products and solutions for aerospace, defense,
  industrial, and medical applications. Product divisions include actuation,
  motion systems, motors, propulsion, valves, aerospace components, and defense
  systems. Moog does not currently publish a public developer API or developer
  portal.
